name: docker-publish

# Builds the headless downloader image and pushes it to GitHub Container Registry
# (ghcr.io/<owner>/jabletv). Runs on GitHub's runners — no local Docker needed.
on:
  push:
    branches: [master]
    paths:
      - 'Dockerfile'
      - 'docker_cli.py'
      - 'requirements-docker.txt'
      - '.dockerignore'
      - 'M3U8Sites/**'
      - 'config.py'
      - 'ssl_util.py'
      - 'site_i18n.py'
      - 'crashlog.py'
      - '.github/workflows/docker-publish.yml'
    tags: ['v*']
  workflow_dispatch: {}   # allow manual runs from the Actions tab

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # push to GHCR with the built-in GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3          # arm64 emulation
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/jabletv
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
